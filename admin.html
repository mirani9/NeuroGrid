<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroGrid · Admin</title>
  <!-- Prevent search engines from indexing this page -->
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-1: #0a0a14;
      --bg-2: #0f0f1e;
      --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.10);
      --accent: #7c6ffa;
      --accent-2: #f472b6;
      --text: #f1f1f9;
      --muted: #8b8ba9;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #1a1040 0%, var(--bg-1) 60%),
                  radial-gradient(ellipse at 80% 70%, #150d2a 0%, transparent 60%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      gap: 32px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
    }
    .header-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-sub {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Cards grid ── */
    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 220px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 28px 24px 24px;
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 48px rgba(0,0,0,0.4);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(124,111,250,0.3), transparent 60%);
      pointer-events: none;
    }

    .card:nth-child(2)::before {
      background: linear-gradient(135deg, rgba(244,114,182,0.3), transparent 60%);
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-value {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.02em;
      min-height: 1.2em;
      transition: color 0.4s;
    }

    .card-value.loading {
      color: var(--muted);
      font-size: 2rem;
    }

    .card-sub {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Refresh bar ── */
    .refresh-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    #refresh-btn {
      background: rgba(124,111,250,0.15);
      border: 1px solid rgba(124,111,250,0.35);
      color: var(--accent);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    #refresh-btn:hover {
      background: rgba(124,111,250,0.28);
      transform: translateY(-1px);
    }

    #refresh-btn:active { transform: scale(0.97); }

    #last-updated {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Countdown ring ── */
    .countdown-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.75rem;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Footer ── */
    .footer {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      opacity: 0.6;
    }

    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── Spin animation on refresh ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 0.6s linear; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-label">🔒 Admin Dashboard</div>
    <h1>NeuroGrid Stats</h1>
    <div class="header-sub">Live metrics for <a href="https://mirani9.github.io/NeuroGrid/" target="_blank" style="color:var(--accent);text-decoration:none;">mirani9.github.io/NeuroGrid</a></div>
  </div>

  <div class="cards">
    <div class="card" id="card-visitors">
      <div class="card-icon">👥</div>
      <div class="card-label">Total Visitors</div>
      <div class="card-value loading" id="val-visitors">…</div>
      <div class="card-sub">Unique browser sessions</div>
    </div>
    <div class="card" id="card-games">
      <div class="card-icon">🎮</div>
      <div class="card-label">Games Played</div>
      <div class="card-value loading" id="val-games">…</div>
      <div class="card-sub">Total restarts / new games</div>
    </div>
  </div>

  <div class="refresh-row">
    <button id="refresh-btn" onclick="manualRefresh()">⟳ Refresh</button>
    <span id="last-updated">Never refreshed</span>
  </div>

  <div class="countdown-wrap">
    <div class="dot"></div>
    <span id="countdown-label">Auto-refreshes in 30s</span>
  </div>

  <div class="footer">
    Data via <a href="https://countapi.xyz" target="_blank">CountAPI</a> · namespace <code>mirani9-neurogrid</code>
  </div>

  <script>
    const NAMESPACE = "mirani9-neurogrid";
    let countdown = 30;
    let countdownInterval = null;

    function fmt(n) {
      if (n === null || n === undefined) return "—";
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, "") + "M";
      if (n >= 1_000)     return (n / 1_000).toFixed(1).replace(/\.0$/, "") + "k";
      return n.toLocaleString();
    }

    function setVal(id, value) {
      const el = document.getElementById(id);
      el.classList.remove("loading");
      el.textContent = fmt(value);
    }

    async function fetchStats() {
      try {
        const [vRes, gRes] = await Promise.all([
          fetch(`https://api.countapi.xyz/get/${NAMESPACE}/visitors`),
          fetch(`https://api.countapi.xyz/get/${NAMESPACE}/games`),
        ]);
        const v = await vRes.json();
        const g = await gRes.json();
        setVal("val-visitors", v.value);
        setVal("val-games",    g.value);

        const now = new Date();
        document.getElementById("last-updated").textContent =
          "Last updated: " + now.toLocaleTimeString();
      } catch (err) {
        document.getElementById("last-updated").textContent = "⚠ Failed to fetch — check network";
      }
    }

    function resetCountdown() {
      countdown = 30;
      document.getElementById("countdown-label").textContent = `Auto-refreshes in ${countdown}s`;
      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        countdown--;
        document.getElementById("countdown-label").textContent =
          countdown > 0 ? `Auto-refreshes in ${countdown}s` : "Refreshing…";
        if (countdown <= 0) {
          fetchStats();
          resetCountdown();
        }
      }, 1000);
    }

    function manualRefresh() {
      const btn = document.getElementById("refresh-btn");
      btn.innerHTML = '<span class="spinning">⟳</span> Refresh';
      fetchStats().then(() => {
        btn.innerHTML = '⟳ Refresh';
        resetCountdown();
      });
    }

    // Init
    fetchStats();
    resetCountdown();
  </script>
</body>
</html>
